name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      # Eval-only check so darwin/nixos host configs can be evaluated on a
      # linux runner without needing to build them. `--impure` is required
      # because homeConfigurations use `builtins.currentSystem`, which is
      # unavailable in the pure evaluation `nix flake check` uses by default.
      - run: nix flake check --no-build --all-systems --impure

  lint:
    runs-on: ubuntu-latest
    # The tree currently has existing statix/deadnix findings; make this
    # blocking again once those are cleaned up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix run nixpkgs#statix -- check .
      - run: nix run nixpkgs#deadnix -- --fail .
